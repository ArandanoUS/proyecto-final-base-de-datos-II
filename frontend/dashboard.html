<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="css/estilos.css">
<script src="js/app.js"></script>
</head>

<body onload="cargarDashboard()">

<header>
    <h2><a href="index.html">SQL Store</a></h2>
    <div>
        <a>Productos</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="historial.html">Historial</a>
        <a href="carrito.html">
            🛒 <span id="cartCount" class="cart-badge" style="display:none;"></span>
        </a>
    </div>
</header>

<div class="container">

<h1>Dashboard</h1>

<div id="resumen" class="product-grid"></div>

<h2>Top Productos</h2>
<div id="topProductos" class="product-grid"></div>

<!-- 🔥 MISMA SECCIÓN KAFKA -->
<div class="kafka-section">

    <div class="kafka-header">
        <h2>Simulación de Procesamiento</h2>

        <div class="kafka-buttons">
            <button class="btn" onclick="simularTrafico()">Kafka</button>
            <button class="btn" style="background:#6b7280;" onclick="simularTrafico1()">Sin Kafka</button>
        </div>
    </div>

    <div class="flujo">
        <div class="nodo" id="nodo-compra">🛒 Compra</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-kafka">📤 Kafka</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-finanzas">💰 Finanzas</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-db">✅ Base de Datos</div>
    </div>

</div>

</div>

<script>

function getImage(nombre) {
    const n = nombre.toLowerCase();

    if (n.includes("laptop")) {
        return "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400";
    }
    if (n.includes("mouse")) {
        return "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400";
    }
    if (n.includes("teclado")) {
        return "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400";
    }
    if (n.includes("monitor")) {
        return "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400";
    }
    if (n.includes("auriculares")) {
        return "https://images.unsplash.com/photo-1518444028785-8b1c1e5b5f7a?w=400";
    }
    if (n.includes("silla")) {
        return "https://images.unsplash.com/photo-1582582494700-1d1f6f7b1f2c?w=400";
    }
    if (n.includes("webcam")) {
        return "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=400";
    }
    if (n.includes("ssd")) {
        return "https://images.unsplash.com/photo-1618424181497-157f25b6ddd5?w=400";
    }
    if (n.includes("ram")) {
        return "https://images.unsplash.com/photo-1563206767-5b18f218e8de?w=400";
    }
    if (n.includes("tarjeta")) {
        return "https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400";
    }
    if (n.includes("gabinete")) {
        return "https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400";
    }

    return "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400";
}

async function cargarDashboard(){
    const res = await fetch("http://localhost:3000/dashboard");
    const data = await res.json();

    document.getElementById("resumen").innerHTML = `
        <div class="product-card"><div class="product-info">
        <h3>Ventas</h3><div class="price">${data.resumen.TotalVentas}</div></div></div>

        <div class="product-card"><div class="product-info">
        <h3>Ingresos</h3><div class="price">$${data.resumen.IngresosTotales}</div></div></div>
    `;

    const cont = document.getElementById("topProductos");
    cont.innerHTML = "";

    data.topProductos.forEach(p=>{
        cont.innerHTML += `
        <div class="product-card">
            <img src="${getImage(p.Nombre)}">
            <div class="product-info">
                <h3>${p.Nombre}</h3>
                <div class="price">${p.TotalVendido} vendidos</div>
            </div>
        </div>`;
    });
}

function activarNodo(id, clase) {
    const nodo = document.getElementById(id);
    nodo.classList.add(clase);
    setTimeout(() => nodo.classList.remove(clase), 800);
}

async function simularTrafico() {

    activarNodo("nodo-compra", "activo");
    setTimeout(() => activarNodo("nodo-kafka", "procesando"), 800);
    setTimeout(() => activarNodo("nodo-finanzas", "procesando"), 1600);
    setTimeout(() => activarNodo("nodo-db", "activo"), 2400);

    const res = await fetch("http://localhost:3000/simular-trafico", { method: "POST" });
    alert(await res.text());
}

async function simularTrafico1() {
    const res = await fetch("http://localhost:3000/simular-trafico1", { method: "POST" });
    alert(await res.text());
}

</script>

</body>
</html>
