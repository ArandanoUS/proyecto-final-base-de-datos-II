<!DOCTYPE html>
<html>
<head>
<title>Carrito</title>
<link rel="stylesheet" href="css/estilos.css">
<script src="js/app.js"></script>
</head>

<body onload="renderCarrito()">

<header>
    <h2><a href="index.html">SQL Store</a></h2>
    <div>
        <a href="productos.html">Productos</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="historial.html">Historial</a>
        <a href="carrito.html">
            🛒 <span id="cartCount" class="cart-badge"></span>
        </a>
    </div>
</header>

<div class="container">

<h1>Tu Carrito</h1>

<div id="listaCarrito"></div>

<hr>

<h2>Total: $<span id="total">0.00</span></h2>

<br>

<button class="btn" onclick="window.location.href='productos.html'">
Seguir comprando
</button>

<button class="btn" style="background:green;" onclick="irAPago()">
Ir a pagar
</button>

</div>

<script>

function renderCarrito(){
    actualizarBadge();

    let carrito = getCarrito();
    const cont = document.getElementById("listaCarrito");
    cont.innerHTML = "";

    let total = 0;

    carrito.forEach((p,index)=>{
        const subtotal = p.Precio * p.cantidad;
        total += subtotal;

        cont.innerHTML += `
        <div class="product-card">
            <div class="product-info">
                <h3>${p.Nombre}</h3>
                <p>$${p.Precio} x ${p.cantidad}</p>
                <div class="price">$${subtotal.toFixed(2)}</div>

                <button class="btn" onclick="aumentar(${index})">+</button>
                <button class="btn" onclick="disminuir(${index})">-</button>
                <button class="btn" style="background:red;" onclick="eliminar(${index})">
                    Eliminar
                </button>
            </div>
        </div>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

function aumentar(i){ let c=getCarrito(); c[i].cantidad++; saveCarrito(c); renderCarrito();}
function disminuir(i){ let c=getCarrito(); c[i].cantidad--; if(c[i].cantidad<=0)c.splice(i,1); saveCarrito(c); renderCarrito();}
function eliminar(i){ let c=getCarrito(); c.splice(i,1); saveCarrito(c); renderCarrito();}
function irAPago(){ window.location.href="pago.html"; }

</script>

</body>
</html>
