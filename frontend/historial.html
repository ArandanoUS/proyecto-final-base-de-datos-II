<!DOCTYPE html>
<html>
<head>
<title>Historial</title>
<link rel="stylesheet" href="css/estilos.css">
<script src="js/app.js"></script>
</head>

<body onload="actualizarBadge()">

<header>
    <h2><a href="index.html">SQL Store</a></h2>
    <div>
        <a href="productos.html">Productos</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="historial.html">Historial</a>
        <a href="carrito.html">
            🛒 <span id="cartCount" class="cart-badge" style="display:none;"></span>
        </a>
    </div>
</header>

<div class="container">

<h1>Historial</h1>

<input id="emailBuscar" placeholder="Correo">
<button class="btn" onclick="buscarHistorial()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

async function buscarHistorial(){
    const email=emailBuscar.value;

    const res=await fetch(`http://localhost:3000/historial/${email}`);
    const data=await res.json();

    resultado.innerHTML="";

    data.forEach(v=>{
        resultado.innerHTML+=`
        <div class="product-card">
            <div class="product-info">
                <h3>Compra #${v.IdVenta}</h3>
                <p>${new Date(v.Fecha).toLocaleString()}</p>
                <div class="price">$${v.Total}</div>
            </div>
        </div>`;
    });
}

</script>

</body>
</html>
