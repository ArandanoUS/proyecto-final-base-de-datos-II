<!DOCTYPE html>
<html>
<head>
<title>Pago</title>
<link rel="stylesheet" href="css/estilos.css">
<script src="js/app.js"></script>
</head>

<body onload="inicializarPago()">

<header>
    <h2><a href="index.html">SQL Store</a></h2>
    <div>
        <a href="productos.html">Productos</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="historial.html">Historial</a>
        <a href="carrito.html">
            🛒 <span id="cartCount" class="cart-badge" style="display:none;"></span>
        </a>
    </div>
</header>

<div class="container">

<h1>Finalizar Compra</h1>

<div id="resumen"></div>

<h2>Total: $<span id="total"></span></h2>

<hr>

<h2>Datos</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="direccion" placeholder="Dirección"><br><br>
<input id="numeroTarjeta" placeholder="Tarjeta"><br><br>

<button class="btn" id="btnPagar" onclick="procesarPago()" disabled>
Pagar
</button>

</div>

<script>

function inicializarPago(){
    actualizarBadge();
    renderResumen();

    document.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input",()=>{
            const ok=[...document.querySelectorAll("input")].every(x=>x.value.trim());
            btnPagar.disabled=!ok;
        });
    });
}

function renderResumen(){
    const c=getCarrito();
    let t=0, html="";

    c.forEach(p=>{
        let sub=p.Precio*p.cantidad;
        t+=sub;
        html+=`<p>${p.Nombre} x${p.cantidad} = $${sub}</p>`;
    });

    resumen.innerHTML=html;
    total.innerText=t.toFixed(2);
}

</script>

</body>
</html>
