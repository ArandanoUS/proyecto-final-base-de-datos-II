<!DOCTYPE html>
<html>
<head>
<title>Home - SQL Store</title>
<link rel="stylesheet" href="css/estilos.css">
<script src="js/app.js"></script>
</head>
<body onload="cargarTop()">

<header>
    <h2><a href="index.html">SQL Store</a></h2>
    <div>
        <a href="productos.html">Productos</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="historial.html">Historial</a>
        <a href="carrito.html">
            🛒 <span id="cartCount" class="cart-badge" style="display:none;"></span>
        </a>
    </div>
</header>

<div class="container">
    <h1>Top Productos</h1>
    <div id="topProductos" class="product-grid"></div>
    <br>
    <a href="productos.html"><button>Ver Todos los Productos</button></a>

    <div style="margin-bottom: 20px;">
        <button onclick="simularTrafico()" style="background:red;color:white;padding:10px 15px;border:none;border-radius:5px;">
            Generar Tráfico (Kafka)
        </button>
    </div>
    <div style="margin-bottom: 20px;">
        <button onclick="simularTrafico1()" style="background:red;color:white;padding:10px 15px;border:none;border-radius:5px;">
            Generar Tráfico (No Kafka)
        </button>
    </div>
    <h2>Flujo de Procesamiento</h2>

    <div class="flujo">
        <div class="nodo" id="nodo-compra">🛒 Compra</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-kafka">📤 Kafka</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-finanzas">💰 Finanzas</div>
        <div class="flecha">➡️</div>
        <div class="nodo" id="nodo-db">✅ Base de Datos</div>
    </div>
</div>

<script>
async function cargarTop() {
    actualizarBadge();

    const res = await fetch("http://localhost:3000/dashboard");
    const data = await res.json();

    const top = data.topProductos.slice(0,3);

    const cont = document.getElementById("topProductos");
    cont.innerHTML = "";

    top.forEach(p => {
        cont.innerHTML += `
        <div class="product-card">
            <img src="https://via.placeholder.com/200">
            <h3>${p.Nombre}</h3>
            <p>Más vendido</p>
        </div>
        `;
    });
}

function activarNodo(id, clase) {
    const nodo = document.getElementById(id);
    nodo.classList.add(clase);

    setTimeout(() => {
        nodo.classList.remove(clase);
    }, 800);
}


async function simularTrafico() {

    // 🔥 Animación visual
    activarNodo("nodo-compra", "activo");

    setTimeout(() => activarNodo("nodo-kafka", "procesando"), 800);
    setTimeout(() => activarNodo("nodo-finanzas", "procesando"), 1600);
    setTimeout(() => activarNodo("nodo-db", "activo"), 2400);    

    const res = await fetch("http://localhost:3000/simular-trafico", {
        method: "POST"
    });

    const msg = await res.text();
    alert(msg);
}

async function simularTrafico1() {
    const res = await fetch("http://localhost:3000/simular-trafico1", {
        method: "POST"
    });

    const msg = await res.text();
    alert(msg);
}
</script>

</body>
</html>
